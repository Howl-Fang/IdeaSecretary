<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaSecretary</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #6366f1;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #818cf8;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: var(--card); box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .brand { font-weight: 700; letter-spacing: .02em; }
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 64px); }
    aside { background: var(--card); padding: 16px; border-right: 1px solid rgba(128,128,128,.2); }
    main { padding: 20px; }
    .nav-item { padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; color: var(--muted); }
    .nav-item.active { background: color-mix(in oklab, var(--accent), transparent 85%); color: var(--text); }
    .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .title { font-size: 1.4rem; margin-top: 0; }
    textarea,input,button,select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; margin-top: 8px; }
    button { background: var(--accent); color: white; border: none; cursor: pointer; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .muted { color: var(--muted); }
    .ticker { overflow: hidden; white-space: nowrap; }
    .ticker span { display: inline-block; padding-left: 100%; animation: move 16s linear infinite; opacity: 0.7; }
    @keyframes move { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  </style>
</head>
<body data-theme="light">
  <header>
    <div class="brand">IDEA SECRETARY</div>
    <div class="row" style="max-width: 420px;">
      <select id="locale">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
      <button id="themeBtn" type="button">Toggle Theme</button>
    </div>
  </header>
  <div class="layout">
    <aside>
      <div class="nav-item active" data-i18n="nav.treasury">Treasury</div>
      <div class="nav-item" data-i18n="nav.ideaBase">My Idea Base</div>
      <div class="nav-item" data-i18n="nav.account">Account</div>
      <div class="nav-item" data-i18n="nav.settings">Settings</div>
    </aside>
    <main>
      <section class="card">
        <h2 class="title" data-i18n="mission.title">Mission</h2>
        <p data-i18n="mission.body">Message, speak, or chat. Capture ideas without losing momentum.</p>
        <div class="ticker"><span>Ideas • Idee • 想法 • アイデア • 아이디어 • Идея</span></div>
      </section>

      <section class="card">
        <h3 data-i18n="treasury.title">Treasury</h3>
        <p class="muted" data-i18n="treasury.tip">What comes up to your mind today?</p>
        <input id="libraryName" placeholder="Library name" />
        <button id="createLibrary">Create / Ensure Library</button>
        <input id="ideaTitle" placeholder="Idea title" />
        <textarea id="ideaContent" rows="7" placeholder="Drop text, URL, or media reference..."></textarea>
        <button id="submitIdea">Organize Idea</button>
        <pre id="output" class="muted"></pre>
      </section>
    </main>
  </div>

  <script>
    const dict = {
      en: {
        "nav.treasury": "Treasury", "nav.ideaBase": "My Idea Base", "nav.account": "Account", "nav.settings": "Settings",
        "mission.title": "Mission", "mission.body": "Message, speak, or chat. Capture ideas without losing momentum.",
        "treasury.title": "Treasury", "treasury.tip": "What comes up to your mind today?"
      },
      zh: {
        "nav.treasury": "金库", "nav.ideaBase": "我的知识库", "nav.account": "账户", "nav.settings": "设置",
        "mission.title": "使命", "mission.body": "发消息、说话或聊天，随手记录灵感并自动整理。",
        "treasury.title": "灵感输入", "treasury.tip": "今天你在想什么？"
      }
    };

    let currentLibraryId = null;

    const localeSelect = document.getElementById("locale");
    const output = document.getElementById("output");

    function renderLocale(locale) {
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const k = el.getAttribute("data-i18n");
        el.textContent = dict[locale][k] || dict.en[k] || k;
      });
    }

    localeSelect.addEventListener("change", (e) => renderLocale(e.target.value));
    renderLocale("en");

    document.getElementById("themeBtn").addEventListener("click", () => {
      document.body.dataset.theme = document.body.dataset.theme === "light" ? "dark" : "light";
    });

    document.getElementById("createLibrary").addEventListener("click", async () => {
      const name = document.getElementById("libraryName").value.trim();
      if (!name) return;

      const listResp = await fetch("/api/libraries");
      const list = await listResp.json();
      let lib = list.find((x) => x.name === name);

      if (!lib) {
        const createResp = await fetch("/api/libraries", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, description: "Default library" })
        });
        lib = await createResp.json();
      }
      currentLibraryId = lib.id;
      output.textContent = `Using library #${lib.id} (${lib.name})`;
    });

    document.getElementById("submitIdea").addEventListener("click", async () => {
      if (!currentLibraryId) {
        output.textContent = "Please create/select a library first.";
        return;
      }
      const payload = {
        library_id: currentLibraryId,
        title: document.getElementById("ideaTitle").value || "Untitled Idea",
        content: document.getElementById("ideaContent").value,
        source_type: "text",
        source_value: "manual",
      };
      const resp = await fetch("/api/ideas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await resp.json();
      output.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
